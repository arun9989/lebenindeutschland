let lang = 'en';
let search = '';

function setLang(l) {
  lang = l;
  document.getElementById('btn-en').className = 'mode-btn' + (l === 'en' ? ' active' : '');
  document.getElementById('btn-de').className = 'mode-btn' + (l === 'de' ? ' active' : '');
  render();
}

document.getElementById('search-input').addEventListener('input', function() {
  search = this.value.toLowerCase().trim();
  render();
});

function render() {
  const filtered = search
    ? QS.filter(q => {
        const d = q[lang];
        return d.q.toLowerCase().includes(search) || d.ans.toLowerCase().includes(search);
      })
    : QS;

  document.getElementById('info-bar').textContent = filtered.length + ' question' + (filtered.length !== 1 ? 's' : '') + (search ? ' matching "' + search + '"' : '');

  const list = document.getElementById('q-list');
  const empty = document.getElementById('empty');

  if (filtered.length === 0) {
    list.innerHTML = '';
    empty.classList.remove('hidden');
    return;
  }
  empty.classList.add('hidden');

  list.innerHTML = filtered.map(q => {
    const d = q[lang];
    return `<div class="q-row">
      <div class="q-num${q.cat === 'nrw' ? ' nrw' : ''}">#${q.n}${q.cat === 'nrw' ? '<br><span style="font-size:0.65rem">NRW</span>' : ''}</div>
      <div class="q-body">
        <div class="q-question">${d.q}</div>
        <div class="q-answer">${d.ans}</div>
      </div>
    </div>`;
  }).join('');
}

render();
</script>
